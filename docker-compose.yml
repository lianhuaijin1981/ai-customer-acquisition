version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: ai_customer_postgres
    environment:
      POSTGRES_DB: ai_customer_acquisition
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ai_customer_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # NestJS 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_customer_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_PORT: 8000
      APP_ENV: production
      APP_JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DATABASE_URL: postgres://postgres:${DB_PASSWORD:-password}@postgres:5432/ai_customer_acquisition
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      KIMI_BASE_URL: https://api.moonshot.cn/v1
    ports:
      - "8000:8000"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"

  # React 前端 (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_customer_frontend
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
